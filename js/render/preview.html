<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Insel-Schlacht — render preview</title>
  <style>
    html, body { margin: 0; height: 100%; background: #04263b; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <!--
    Standalone preview for js/render/renderer.js and js/render/effects.js,
    driven by hardcoded data from mockState.js so it works before
    islandLoader.js, mapGenerator.js and actions.js exist. Not part of
    the real game - the project-root index.html never loads this file.

    Run with: python3 -m http.server (from the project root), then open
    http://localhost:8000/js/render/preview.html
  -->
  <canvas id="preview-canvas"></canvas>
  <script type="module" src="./previewMain.js"></script>
</body>
</html>
